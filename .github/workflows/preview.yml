name: Validate Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and validate site
        run: python build.py --validate --minify-css
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUNBUFFERED: "1"

      - name: Check JavaScript syntax
        run: node --check static/js/main.js

      - name: Check generated site integrity
        run: python -m tools.check_site_integrity

      - name: Check Lighthouse budgets
        run: |
          python -m http.server 8000 --directory docs > /tmp/legacy-defenders-http.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8000/index.html > /dev/null && break
            sleep 1
          done
          node tools/run_lighthouse_budget.mjs http://127.0.0.1:8000/index.html --min 90

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report
          path: validation-report.json
          retention-days: 14

      - name: Upload built site preview
        uses: actions/upload-artifact@v4
        with:
          name: built-site
          path: docs
          retention-days: 7
