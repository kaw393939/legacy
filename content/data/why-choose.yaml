why_choose:
  section_title: "Built From The Problem Families Actually Face"

  reasons:
    - id: lived-experience
      title: "We Have Lived The Nightmare"
      icon: "fa-house-heart"
      image: "images/proof/smoke-remediation-before-after.jpg"
      image_alt: "Representative before and after of a smoke-stained inherited home being restored"
      order: 1
      description: |
        Keith called lawyers, tax people, contractors, and cleaning services and kept feeling like the estate was being treated as an opportunity for someone else. He almost sold his inherited home for a fraction of its potential value because the house, belongings, repairs, paperwork, and grief were overwhelming. Mike had already experienced the pain of losing a family home. Legacy Defenders exists so other families do not have to face that moment alone.

    - id: care-coordinator
      title: "We Teach Before We Ask You To Decide"
      icon: "fa-hands-holding-heart"
      image: "images/proof/estate-cleanout-before-after.jpg"
      image_alt: "Representative before and after of belongings being sorted and cleared from an inherited home"
      order: 2
      description: |
        Rachel's role is to help the family feel heard, organized, and supported. She understands how grief can make ordinary decisions feel impossible. We explain the options, show the tradeoffs, and help people make informed decisions without shame or pressure.

    - id: value-conscious
      title: "Practical Repairs That Protect The Outcome"
      icon: "fa-screwdriver-wrench"
      image: "images/proof/landscaping-before-after.jpg"
      image_alt: "Representative before and after of an inherited home exterior stabilized for curb appeal"
      order: 3
      description: |
        Mike's construction experience helps separate what matters from what wastes money. The goal is a clean, functional, modern, market-ready or move-in-ready home with documented work and smart priorities.
