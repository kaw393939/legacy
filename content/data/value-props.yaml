value_props:
  - id: care-led
    title: "Estate Math First"
    icon: "fa-calculator"
    order: 1
    description: |
      Many heirs have never had to price a house project, carrying costs, cleanout, storage, repairs, and probate records at the same time. We help the executor understand what the estate may cost before larger decisions are made.

  - id: documented
    title: "Inventory, Memories & Records"
    icon: "fa-qrcode"
    order: 2
    description: |
      Color-coded QR tags, photos, item records, storage logs, shipping notes, receipts, utility notes, repair scopes, invoices, and project updates create a record the executor, attorney, CPA, realtor, lender, and family can understand.

  - id: provider-network
    title: "Local Service Network"
    icon: "fa-handshake"
    order: 3
    description: |
      Families should not have to call movers, cleaners, storage, disposal, contractors, donation options, and emergency help from scratch while grieving. Our provider relationships help the estate move faster with clearer scopes and preferred pricing where available.

  - id: preserve-value
    title: "Time Back For The Executor"
    icon: "fa-chart-line"
    order: 4
    description: |
      We centralize the work so the executor is not forced to become a project manager, provider negotiator, inventory clerk, and estate recordkeeper overnight. The goal is less friction and better decisions.
