testimonials:
  - id: keith-story
    name: "Keith"
    location: "Inherited family home"
    service_used: "Original Legacy Defenders case"
    rating: 5
    avatar_icon: "fa-user"
    order: 1
    quote: |
      "I inherited a house with real value, but I was overwhelmed, out of state, and did not know who to trust. I called lawyers, tax people, contractors, and cleanout services and kept feeling like the estate was being treated as someone else's opportunity. Mike helped me avoid a low offer and turn the house into something I could be proud of."

  - id: mike-story
    name: "Mike"
    location: "Construction and family-home experience"
    service_used: "Property recovery and modernization"
    rating: 5
    avatar_icon: "fa-user"
    order: 2
    quote: |
      "I know what it feels like to lose a family home. The right repairs, the right timing, and the right care can change the outcome for a family. This work is about protecting value without forgetting what the home meant."

  - id: rachel-story
    name: "Rachel"
    location: "Care coordination"
    service_used: "Family support and inventory"
    rating: 5
    avatar_icon: "fa-user"
    order: 3
    quote: |
      "I have lived through deep family loss. When someone is grieving, the last thing they need is judgment. They need a calm person beside them, a process they can trust, and help making decisions that feel impossible in the moment."
