prearranged_plan:
  section_title: "Prearranged Legacy Protection"
  section_subtitle: "A plan made early can spare your children from guessing, arguing, overpaying, or making rushed decisions while they are grieving."
  eyebrow: "Plan ahead for your heirs"
  intro: "Some parents know their home, belongings, paperwork, repairs, or family dynamics could overwhelm the people they love. A prearranged Legacy Readiness Plan lets us document your wishes, understand the home, prepare the likely scope, and be ready to activate when your heirs need help."
  discount_text: "Prearranged families can receive priority activation and a planning discount or service credit toward the future project. The exact discount depends on the plan level, update schedule, and scope."
  boundary_text: "This does not replace a will, trust, power of attorney, estate attorney, tax advisor, lender, realtor, or licensed trade professional. It gives your family a practical operating plan and a care team that already understands the house."
  cta:
    text: "Plan This Before It Becomes Urgent"
    url: "prearranged.html"
    icon: "fa-calendar-check"
  steps:
    - title: "Walk The Home"
      icon: "fa-house"
      description: "We document condition, deferred maintenance, smoke or odor concerns, storage areas, important rooms, and urgent risks your heirs should not have to discover alone."
    - title: "Record Your Wishes"
      icon: "fa-heart"
      description: "We identify sentimental items, family distribution wishes, donation preferences, sale priorities, documents, contacts, and the memories you want protected."
    - title: "Build The Activation Plan"
      icon: "fa-clipboard-list"
      description: "We create an activation plan that explains who to call, what happens first, likely services, preferred providers, estimated phases, possible funding paths, and how the family can make decisions."
    - title: "Prepare Funding Options"
      icon: "fa-file-invoice-dollar"
      description: "We outline possible payment, financing, estate-fund, or sale-proceeds paths so your heirs can review options with the appropriate professionals."
  outcomes:
    - "Your heirs know who to call first"
    - "Important belongings are less likely to be lost or discarded"
    - "The house can be stabilized quickly"
    - "Family decisions are documented before grief takes over"
    - "Repairs, cleanout, storage, donation, and sale prep can follow a plan"
    - "The intended legacy is more likely to be preserved"
