# Project CLI configuration.
#
# The public site reads content/config.yaml during the actual build. This file
# configures the convenience CLI in site.py and the local development workflow.

project:
  name: "Legacy Defenders"
  version: "1.0.0"
  description: "Static site for inherited-home estate transition support"

site:
  url: "https://kaw393939.github.io/legacy"
  title: "Legacy Defenders"
  language: "en"
  deployment: "github-pages"
  github_pages_url: "https://kaw393939.github.io/legacy/"

build:
  source_dir: "."
  output_dir: "docs"
  templates_dir: "templates"
  content_dir: "content"
  static_dir: "static"
  clean_before_build: true

validation:
  check_yaml: true
  check_content_contracts: true
  check_generated_site: true
  check_js: true
  validate_output: true
  fail_on_error: true

backup:
  enabled: false
  location: "backups"
  keep_last: 5
  auto_backup_before_build: false

development:
  server:
    host: "localhost"
    port: 8000
    open_browser: false

performance:
  track_build_time: true
  track_file_sizes: true
  minify_css: true
  lighthouse_checks: true
  lighthouse_min_score: 90

logging:
  level: "INFO"
  console: true
