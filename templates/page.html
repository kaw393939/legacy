{% extends "base.html" %}

{% block content %}
<section class="page-hero public-page-hero">
    <div class="container">
        <div class="hero-content">
            {% if page.eyebrow %}
            <p class="hero-eyebrow">{{ page.eyebrow }}</p>
            {% endif %}
            <h1 class="hero-title">{{ page.title }}</h1>
            <p class="hero-description">{{ page.description }}</p>
            {% if page.stats %}
            <div class="hero-stats">
                {% for stat in page.stats %}
                <div class="stat">
                    <span class="stat-number">{{ stat.number }}</span>
                    <span class="stat-label">{{ stat.label }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
</section>

<section class="section-spacing">
    <div class="container">
        <div class="content-page public-content">
            {{ content | safe }}
        </div>
    </div>
</section>
{% endblock %}
